services:
  - type: web
    name: esp32-voicebot
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 90
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # you'll set this in the Render dashboard
    healthCheckPath: /health
